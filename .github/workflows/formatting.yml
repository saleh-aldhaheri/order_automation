name: Formatting

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  formatting:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'formatting')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Foramt the code
        run: ./vendor/bin/pint --parallel

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: formatting
