services:
  app:
    container_name: test_app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME_ROOT}
      - DB_PASSWORD=${DB_PASSWORD_ROOT}
      - QUEUE_CONNECTION=sync
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - public:/my-app/public:rw
      - storage:/my-app/storage:rw
    networks:
      - testing

  db:
    container_name: test_db
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD_ROOT}
      - MYSQL_DATABASE=${DB_DATABASE}
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 --protocol=TCP -uroot -p${DB_PASSWORD_ROOT}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db:/var/lib/mysql
    networks:
      - testing

volumes:
  db:
  storage:
  public:

networks:
  testing:
