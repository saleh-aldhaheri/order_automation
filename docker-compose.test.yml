services:
  app:
    container_name: test_app
    build:
      context: .
      dockerfile: Dockerfile
    # CI only needs the container alive to `docker exec` into it. Override the
    # Dockerfile CMD (entrypoint -> migrate -> `artisan serve`) so we don't run a
    # dev server + boot migrations competing for memory while composer installs.
    command: ["tail", "-f", "/dev/null"]
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME_ROOT}
      - DB_PASSWORD=${DB_PASSWORD_ROOT}
      - QUEUE_CONNECTION=sync
    depends_on:
      db:
        condition: service_healthy
    networks:
      - testing

  db:
    container_name: test_db
    image: mysql:8.4
    # Trim MySQL's default memory footprint (perf schema + buffer pool) so the
    # runner has headroom for composer/test runs.
    command: --performance-schema=OFF --innodb-buffer-pool-size=128M
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD_ROOT}
      - MYSQL_DATABASE=${DB_DATABASE}
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -P 3306 --protocol=TCP -uroot -p${DB_PASSWORD_ROOT}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db:/var/lib/mysql
    networks:
      - testing

volumes:
  db:

networks:
  testing:
